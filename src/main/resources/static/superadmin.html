<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Console - Event Hub</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="dashboard-page">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="index.html" style="display: flex; align-items: center; gap: 10px;">
                <img src="images/kasc_logo.jpg" alt="KASC Logo" style="height: 42px; width: auto; border-radius: 50%; object-fit: cover;">
                <span style="font-weight: 800; font-size: 1.3rem; letter-spacing: 0.5px;">KASC EVENT HUB</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- Dynamic Navbar links generated by app.js -->
                    <li class="nav-item ms-lg-2">
                        <button class="btn btn-glass" onclick="toggleTheme()" title="Toggle Light/Dark Mode" style="border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; padding: 0;">
                            <i id="theme-toggle-icon" class="fa-solid fa-sun text-warning"></i>
                        </button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <button class="btn btn-outline-danger btn-sm px-3" onclick="handleLogout()"><i class="fa-solid fa-power-off me-1"></i> Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="container my-5" id="superadmin-workspace" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div class="superadmin-profile-section p-3 rounded glass-panel d-flex align-items-center gap-3">
                <div class="profile-avatar-glow d-flex align-items-center justify-content-center bg-warning text-dark rounded-circle" style="width: 50px; height: 50px; flex-shrink: 0; box-shadow: 0 0 12px rgba(245, 158, 11, 0.4);">
                    <i class="fa-solid fa-crown fa-lg crown-glow-shake"></i>
                </div>
                <div>
                    <h1 class="h4 text-white fw-bold mb-1">Super Admin Console</h1>
                    <p class="text-muted mb-0 small">Logged in: Maheshwaran (Super Admin)</p>
                </div>
            </div>
            <button class="btn btn-primary-gradient px-4" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openCreateUserModal()">
                <i class="fa-solid fa-user-plus me-2"></i>Create User Account
            </button>
        </div>

        <!-- System Analytics Counters -->
        <div class="row g-4 mb-5">
            <div class="col-6 col-lg-3 animate-fade-up" style="animation-delay: 0.1s;">
                <div class="glass-panel p-4 text-center" style="cursor: pointer;" onclick="navigateToAdminConsole('depts')">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary-glow text-primary rounded-circle mb-3" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-building-columns fa-lg"></i>
                    </div>
                    <h3 id="stat-depts" class="fw-bold text-white mb-1">-</h3>
                    <p class="text-muted small mb-0">Total Departments</p>
                </div>
            </div>
            <div class="col-6 col-lg-3 animate-fade-up" style="animation-delay: 0.2s;">
                <div class="glass-panel p-4 text-center" style="cursor: pointer;" onclick="navigateToAdminConsole('events')">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success-glow text-success rounded-circle mb-3" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-calendar-check fa-lg"></i>
                    </div>
                    <h3 id="stat-events" class="fw-bold text-white mb-1">-</h3>
                    <p class="text-muted small mb-0">Total Events</p>
                </div>
            </div>
            <div class="col-6 col-lg-3 animate-fade-up" style="animation-delay: 0.3s;">
                <div class="glass-panel p-4 text-center" style="cursor: pointer;" onclick="navigateToAdminConsole('registrations')">
                    <div class="d-inline-flex align-items-center justify-content-center bg-info-glow text-info rounded-circle mb-3" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-ticket fa-lg"></i>
                    </div>
                    <h3 id="stat-regs" class="fw-bold text-white mb-1">-</h3>
                    <p class="text-muted small mb-0">Event Registrations</p>
                </div>
            </div>
            <div class="col-6 col-lg-3 animate-fade-up" style="animation-delay: 0.4s;">
                <div class="glass-panel p-4 text-center" style="cursor: pointer;" onclick="navigateToAdminConsole('notices')">
                    <div class="d-inline-flex align-items-center justify-content-center bg-danger-glow text-danger rounded-circle mb-3" style="width: 50px; height: 50px;">
                        <i class="fa-solid fa-bullhorn fa-lg"></i>
                    </div>
                    <h3 id="stat-notifs" class="fw-bold text-white mb-1">-</h3>
                    <p class="text-muted small mb-0">System Notices</p>
                </div>
            </div>
        </div>

        <!-- Users Directory Table -->
        <div id="users-directory-panel" class="glass-panel p-4 animate-fade-up" style="animation-delay: 0.5s;">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h4 class="fw-bold text-white mb-0"><i class="fa-solid fa-shield-halved text-secondary me-2"></i>Users & Roles Directory</h4>
                <div class="d-flex gap-2">
                    <input type="text" id="user-search" class="form-control form-control-sm form-control-custom" placeholder="Search users..." oninput="filterUsersTable()">
                    <select id="role-filter" class="form-select form-select-sm form-control-custom form-select-custom" onchange="filterUsersTable()">
                        <option value="">All Roles</option>
                        <option value="ROLE_SUPER_ADMIN">Super Admin</option>
                        <option value="ROLE_ADMIN">Admin</option>
                        <option value="ROLE_DEPARTMENT">Department</option>
                        <option value="ROLE_STUDENT">Student</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>User ID / Username</th>
                            <th>Full Name</th>
                            <th>Role</th>
                            <th>Email Address</th>
                            <th>Contact</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="6" class="text-center py-4 text-muted">
                                <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                Fetching user directory...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create/Edit User Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom glass-panel border border-secondary text-white">
                <div class="modal-header modal-header-custom border-bottom border-secondary">
                    <h5 class="modal-title fw-bold" id="userModalLabel">User Account Form</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="user-form" onsubmit="handleUserSubmit(event)">
                        <input type="hidden" id="form-user-id">
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Username / Login ID</label>
                            <input type="text" id="form-username" class="form-control form-control-custom" placeholder="e.g. Maheshwaran, Admin, or Student Roll" required>
                        </div>
                        <div class="mb-3" id="password-field-container">
                            <label class="form-label text-muted small fw-bold">Password</label>
                            <input type="password" id="form-password" class="form-control form-control-custom" placeholder="Min 4 characters">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Full Display Name</label>
                            <input type="text" id="form-name" class="form-control form-control-custom" placeholder="e.g. Arun Kumar, IT Department" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">System Role</label>
                            <select id="form-role" class="form-select form-control-custom" required onchange="toggleFormFields()">
                                <option value="ROLE_STUDENT">Student</option>
                                <option value="ROLE_DEPARTMENT">Department</option>
                                <option value="ROLE_ADMIN">Admin</option>
                                <option value="ROLE_SUPER_ADMIN">Super Admin</option>
                            </select>
                        </div>
                        <div class="mb-3 row" id="role-extra-fields">
                            <div class="col-6">
                                <label class="form-label text-muted small fw-bold">Dept Code / Roll Prefix</label>
                                <input type="text" id="form-dept-code" class="form-control form-control-custom" placeholder="e.g. IT, CS">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Email Address</label>
                            <input type="email" id="form-email" class="form-control form-control-custom" autocomplete="new-email" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Contact Number</label>
                            <input type="text" id="form-contact" class="form-control form-control-custom" placeholder="e.g. 9876543210">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary-gradient py-2 fw-bold"><i class="fa-solid fa-save me-2"></i>Save Account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="js/app.js"></script>
    <script>
        let allUsers = [];

        function navigateToAdminConsole(tabName) {
            window.location.href = `admin.html?tab=${tabName}`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Check cross-role access
            if (localStorage.getItem("eventhub_student_session")) {
                window.location.href = "dashboard.html";
                return;
            }
            if (localStorage.getItem("eventhub_dept_session")) {
                window.location.href = "department.html";
                return;
            }

            // Verify Super Admin Authorization
            const superAdminToken = localStorage.getItem("eventhub_superadmin_token");
            if (!superAdminToken) {
                window.location.href = "login.html?redirect=superadmin.html";
                return;
            }

            // Show workspace
            document.getElementById("superadmin-workspace").style.display = "block";

            // Load data
            loadAnalytics();
            loadUsers();
        });

        function handleLogout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        function loadAnalytics() {
            fetch("/api/superadmin/analytics")
                .then(res => {
                    if (res.status === 401 || res.status === 403) handleLogout();
                    return res.json();
                })
                .then(data => {
                    document.getElementById("stat-depts").innerText = data.totalDepartments || 0;
                    document.getElementById("stat-events").innerText = data.totalEvents || 0;
                    document.getElementById("stat-regs").innerText = data.totalRegistrations || 0;
                    document.getElementById("stat-notifs").innerText = data.totalNotifications || 0;
                })
                .catch(err => console.error("Error loading analytics:", err));
        }

        function loadUsers() {
            fetch("/api/superadmin/users")
                .then(res => res.json())
                .then(users => {
                    allUsers = users;
                    renderUsersTable(users);
                })
                .catch(err => {
                    console.error("Error loading users:", err);
                    document.getElementById("users-tbody").innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center py-4 text-danger">Failed to load user directory.</td>
                        </tr>
                    `;
                });
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById("users-tbody");
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No accounts found.</td></tr>`;
                return;
            }

            // Define group order, headers, and badge designs
            const rolesOrder = [
                { role: "ROLE_SUPER_ADMIN", title: "Super Admin", badgeClass: "bg-warning text-dark" },
                { role: "ROLE_ADMIN", title: "Admin", badgeClass: "bg-danger" },
                { role: "ROLE_DEPARTMENT", title: "Department", badgeClass: "bg-success" },
                { role: "ROLE_STUDENT", title: "Student", badgeClass: "bg-primary" }
            ];

            let html = "";
            rolesOrder.forEach(roleGroup => {
                const groupUsers = users.filter(u => u.role === roleGroup.role);
                if (groupUsers.length > 0) {
                    // Render a grouped sub-header row
                    html += `
                        <tr class="table-group-header" style="background: rgba(255, 255, 255, 0.05); font-weight: bold; border-left: 4px solid var(--primary);">
                            <td colspan="6" class="py-2 px-3" style="color: var(--text-primary);">
                                <i class="fa-solid fa-users-gear me-2"></i>${roleGroup.title}s (${groupUsers.length})
                            </td>
                        </tr>
                    `;
                    groupUsers.forEach(u => {
                        html += `
                            <tr>
                                <td class="ps-4">
                                    <div class="fw-bold text-white">${u.username}</div>
                                    <small class="text-muted">UID: #${u.id}</small>
                                </td>
                                <td>${u.name}</td>
                                <td><span class="badge ${roleGroup.badgeClass}">${roleGroup.title}</span></td>
                                <td>${u.email || '<span class="text-muted small">N/A</span>'}</td>
                                <td>${u.contactNumber || '<span class="text-muted small">N/A</span>'}</td>
                                <td class="text-end">
                                    <button class="btn btn-outline-info btn-sm me-1" onclick="openEditUserModal(${u.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="deleteUser(${u.id}, '${u.username}')" ${u.username === 'Maheshwaran' ? 'disabled' : ''}><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        `;
                    });
                }
            });

            // Fallback for any other roles
            const mainRoles = rolesOrder.map(r => r.role);
            const otherUsers = users.filter(u => !mainRoles.includes(u.role));
            if (otherUsers.length > 0) {
                html += `
                    <tr class="table-group-header" style="background: rgba(255, 255, 255, 0.05); font-weight: bold; border-left: 4px solid #6c757d;">
                        <td colspan="6" class="py-2 px-3" style="color: var(--text-primary);">
                            <i class="fa-solid fa-users-gear me-2"></i>Other Roles (${otherUsers.length})
                        </td>
                    </tr>
                `;
                otherUsers.forEach(u => {
                    html += `
                        <tr>
                            <td class="ps-4">
                                <div class="fw-bold text-white">${u.username}</div>
                                <small class="text-muted">UID: #${u.id}</small>
                            </td>
                            <td>${u.name}</td>
                            <td><span class="badge bg-secondary">${u.role}</span></td>
                            <td>${u.email || '<span class="text-muted small">N/A</span>'}</td>
                            <td>${u.contactNumber || '<span class="text-muted small">N/A</span>'}</td>
                            <td class="text-end">
                                <button class="btn btn-outline-info btn-sm me-1" onclick="openEditUserModal(${u.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteUser(${u.id}, '${u.username}')" ${u.username === 'Maheshwaran' ? 'disabled' : ''}><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            }

            tbody.innerHTML = html;
        }

        function filterUsersTable() {
            const search = document.getElementById("user-search").value.toLowerCase();
            const role = document.getElementById("role-filter").value;

            const filtered = allUsers.filter(u => {
                const matchesSearch = u.username.toLowerCase().includes(search) || u.name.toLowerCase().includes(search) || (u.email && u.email.toLowerCase().includes(search));
                const matchesRole = role === "" || u.role === role;
                return matchesSearch && matchesRole;
            });
            renderUsersTable(filtered);
        }

        function toggleFormFields() {
            const role = document.getElementById("form-role").value;
            const extraContainer = document.getElementById("role-extra-fields");
            if (role === "ROLE_STUDENT" || role === "ROLE_DEPARTMENT") {
                extraContainer.style.display = "flex";
            } else {
                extraContainer.style.display = "none";
            }
        }

        function openCreateUserModal() {
            document.getElementById("userModalLabel").innerText = "Create User Account";
            document.getElementById("form-user-id").value = "";
            document.getElementById("user-form").reset();
            document.getElementById("password-field-container").style.display = "block";
            document.getElementById("form-password").setAttribute("required", "required");
            toggleFormFields();
        }

        function openEditUserModal(id) {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;

            document.getElementById("userModalLabel").innerText = "Edit User Account";
            document.getElementById("form-user-id").value = user.id;
            document.getElementById("form-username").value = user.username;
            document.getElementById("form-name").value = user.name;
            document.getElementById("form-role").value = user.role;
            document.getElementById("form-email").value = user.email || "";
            document.getElementById("form-contact").value = user.contactNumber || "";
            
            // Password is optional during edit
            document.getElementById("form-password").value = "";
            document.getElementById("form-password").removeAttribute("required");

            toggleFormFields();

            if (user.role === "ROLE_STUDENT" || user.role === "ROLE_DEPARTMENT") {
                document.getElementById("form-dept-code").value = user.department || "";
            }

            const modal = new bootstrap.Modal(document.getElementById("userModal"));
            modal.show();
        }

        function handleUserSubmit(e) {
            e.preventDefault();
            const id = document.getElementById("form-user-id").value;
            const username = document.getElementById("form-username").value.trim();
            const password = document.getElementById("form-password").value;
            const name = document.getElementById("form-name").value.trim();
            const role = document.getElementById("form-role").value;
            const email = document.getElementById("form-email").value.trim();
            const contactNumber = document.getElementById("form-contact").value.trim();
            const departmentCode = document.getElementById("form-dept-code").value.trim();

            const url = id ? `/api/superadmin/users/${id}` : "/api/superadmin/users";
            const method = id ? "PUT" : "POST";

            const payload = {
                username,
                name,
                role,
                email,
                contactNumber,
                departmentCode
            };
            if (password) payload.password = password;

            fetch(url, {
                method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (res.ok) return res.json();
                return res.json().then(err => { throw new Error(err.error || "Save user failed") });
            })
            .then(() => {
                showSuccessPopup("User Account Saved");
                const modalEl = document.getElementById("userModal");
                const modalInstance = bootstrap.Modal.getInstance(modalEl);
                if (modalInstance) modalInstance.hide();
                loadUsers();
                loadAnalytics();
            })
            .catch(err => {
                alert("Error: " + err.message);
            });
        }

        function deleteUser(id, username) {
            if (!confirm(`Are you sure you want to permanently delete user "${username}"?`)) return;

            fetch(`/api/superadmin/users/${id}`, {
                method: "DELETE"
            })
            .then(res => {
                if (res.ok) {
                    showSuccessPopup("User Account Deleted");
                    loadUsers();
                    loadAnalytics();
                } else {
                    alert("Failed to delete user account.");
                }
            })
            .catch(err => console.error("Error deleting user:", err));
        }
    </script>
</body>
</html>
